<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Register</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script type="module" src="./js/register.js"></script>
	</head>
	<body>
		<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
			<div class="container-fluid">
				<a class="navbar-brand" href="#"
					>Advanced Web Applications Project</a
				>
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarNavAltMarkup"
					aria-controls="navbarNavAltMarkup"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNavAltMarkup">
					<div class="navbar-nav">
						<a class="nav-link" aria-current="page" href="/index"
							>Documents</a
						>
						<a class="nav-link active" href="/register">Register</a>
						<a class="nav-link" href="/login">Login</a>
					</div>
				</div>
			</div>
		</nav>
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-6 col-12">
					<form id="registerForm" class="m-4">
						<div class="mb-4">
							<h2>Register</h2>
						</div>
						<div class="mb-2">
							<label for="username" class="form-label"
								>Username</label
							>
							<input
								type="text"
								class="form-control"
								id="username"
							/>
							<div class="form-text">
								Your username should be 3-64 characters long
							</div>
						</div>
						<div class="mb-2">
							<label for="password" class="form-label"
								>Password</label
							>
							<input
								type="password"
								class="form-control"
								id="password"
							/>
							<div class="form-text">
								Your password should be 8-64 characters long
							</div>
							<div id="passwordHint" class="form-text"></div>
						</div>
						<div class="mb-2">
							<div class="form-text" id="responseText"></div>
						</div>
						<button type="submit" class="btn btn-primary">
							Submit
						</button>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
