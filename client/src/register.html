<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Register</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script type="module" src="./js/register.js"></script>
	</head>
	<body>
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-4 col-8">
					<form id="registerForm">
						<div class="mb-4">
							<h2>Register</h2>
						</div>
						<div class="mb-2">
							<label for="username" class="form-label"
								>Username</label
							>
							<input
								type="text"
								class="form-control"
								id="username"
							/>
							<div class="form-text">
								Your username should be 3-64 characters long
							</div>
						</div>
						<div class="mb-2">
							<label for="password" class="form-label"
								>Password</label
							>
							<input
								type="password"
								class="form-control"
								id="password"
							/>
							<div class="form-text">
								Your password should be 8-64 characters long
							</div>
							<div id="passwordHint" class="form-text"></div>
						</div>
						<div class="mb-2">
							<div class="form-text" id="responseText"></div>
						</div>
						<button type="submit" class="btn btn-primary">
							Submit
						</button>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
