<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Advanced Web Project</title>
		<script type="module" src="./js/index.js"></script>
	</head>
	<body>
		<nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
			<div class="container-fluid">
				<a class="navbar-brand" href="#"
					>Advanced Web Applications Project</a
				>
				<button
					class="navbar-toggler"
					type="button"
					data-bs-toggle="collapse"
					data-bs-target="#navbarNavAltMarkup"
					aria-controls="navbarNavAltMarkup"
					aria-expanded="false"
					aria-label="Toggle navigation"
				>
					<span class="navbar-toggler-icon"></span>
				</button>
				<div class="collapse navbar-collapse" id="navbarNavAltMarkup">
					<div class="navbar-nav">
						<a
							class="nav-link active"
							aria-current="page"
							href="/index"
							>Documents</a
						>
						<a class="nav-link" href="/register">Register</a>
						<a class="nav-link" href="/login">Login</a>
					</div>
				</div>
			</div>
		</nav>

		<div id="settingsModal" class="modal" tabindex="-1">
			<div class="modal-dialog modal-dialog-centered">
				<div class="modal-content">
					<div class="modal-header">
						<h5 id="settingsModalTitle" class="modal-title">
							Settings for
						</h5>
						<button
							type="button"
							class="btn-close"
							data-bs-dismiss="modal"
						></button>
					</div>
					<div class="modal-body">
						<form id="renameDocumentForm">
							<h6>Rename document</h6>
							<div class="row">
								<div class="col-8">
									<div class="form-floating">
										<!-- placeholder has to be nonempty for floating labels to work in bootstrap -->
										<input
											id="newDocumentName"
											type="text"
											placeholder="funny and awesome document name"
											class="form-control"
										/>
										<label
											for="documentName"
											class="form-label"
											>New document name</label
										>
									</div>
								</div>
								<button class="col-4 btn btn-primary">
									Rename
								</button>
							</div>
						</form>
						<form id="addPermissionsForm" class="mt-4">
							<h6>Give another user editing permissions</h6>
							<div class="row">
								<div class="col-8">
									<div class="form-floating">
										<!-- placeholder has to be nonempty for floating labels to work in bootstrap -->
										<input
											id="givePermissionInput"
											type="text"
											placeholder="funny and awesome document name"
											class="form-control"
										/>
										<label
											for="documentName"
											class="form-label"
											>Add another user</label
										>
									</div>
								</div>
								<button class="col-4 btn btn-primary">
									Give Permissions
								</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>

		<div class="container">
			<div class="row justify-content-center">
				<div class="col-12 col-lg-6">
					<h1 class="m-4">Drive</h1>

					<form id="createDocument" class="m-4">
						<div class="row">
							<div class="col-8">
								<div class="form-floating">
									<!-- placeholder has to be nonempty for floating labels to work in bootstrap -->
									<input
										id="documentName"
										type="text"
										placeholder="funny and awesome document name"
										class="form-control"
									/>
									<label for="documentName" class="form-label"
										>Document name</label
									>
								</div>
							</div>

							<button class="col-4 btn btn-primary">
								Create Document
							</button>
						</div>
					</form>

					<table class="col-12 table my-4">
						<thead>
							<tr>
								<th scope="col">Owner</th>
								<th scope="col">Name</th>
								<th scope="col">Actions</th>
							</tr>
						</thead>
						<tbody id="tableBody"></tbody>
					</table>
				</div>
			</div>
		</div>
	</body>
</html>
