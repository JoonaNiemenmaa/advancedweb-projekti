<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Login</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<script type="module" src="./js/login.js"></script>
	</head>
	<body>
		<div class="container">
			<div class="row justify-content-center">
				<div class="col-lg-4 col-8">
					<form id="loginForm">
						<div class="mb-4">
							<h2>Login</h2>
						</div>
						<div class="mb-2">
							<label for="username" class="form-label"
								>Username</label
							>
							<input
								type="text"
								class="form-control"
								id="username"
							/>
						</div>
						<div class="mb-2">
							<label for="password" class="form-label"
								>Password</label
							>
							<input
								type="password"
								class="form-control"
								id="password"
							/>
						</div>
						<div class="form-text" id="responseText"></div>
						<button type="submit" class="btn btn-primary mt-2">
							Submit
						</button>
					</form>
				</div>
			</div>
		</div>
	</body>
</html>
